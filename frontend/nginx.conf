server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    include /etc/nginx/mime.types;

    location = /favicon.ico {
        try_files $uri =404;
        access_log off;
        log_not_found off;
    }

    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri /index.html;
    }
}
