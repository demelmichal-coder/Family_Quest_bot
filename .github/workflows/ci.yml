name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ./backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Apply migrations
        run: python -m alembic upgrade head
        env:
          DB_URL: sqlite:///./test_familyquest.db

      - name: Run backend tests
        run: python -m pytest tests
        env:
          DB_URL: sqlite:///./test_familyquest.db

      - name: Verify backend imports
        run: python -c "import main, telegram_bot; print('backend imports ok')"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

  deployment-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker compose
        run: docker compose config

  docker-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: familyquest-backend:ci
          cache-from: type=gha,scope=backend-image
          cache-to: type=gha,scope=backend-image,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: familyquest-frontend:ci
          cache-from: type=gha,scope=frontend-image
          cache-to: type=gha,scope=frontend-image,mode=max
